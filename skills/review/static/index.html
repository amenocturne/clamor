<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* === Syntax Highlighting (Catppuccin Mocha) === */
    .hljs-keyword,
    .hljs-selector-tag,
    .hljs-built_in,
    .hljs-name { color: #cba6f7; }           /* mauve */

    .hljs-string,
    .hljs-attr,
    .hljs-symbol,
    .hljs-template-tag,
    .hljs-template-variable,
    .hljs-addition { color: #a6e3a1; }       /* green */

    .hljs-comment,
    .hljs-quote { color: #6c7086; font-style: italic; }  /* overlay0 */

    .hljs-number,
    .hljs-literal,
    .hljs-variable.constant_ { color: #fab387; }  /* peach */

    .hljs-type,
    .hljs-class .hljs-title,
    .hljs-title.class_,
    .hljs-title.function_ { color: #89dceb; }  /* sky */

    .hljs-params { color: #f2cdcd; }          /* flamingo */

    .hljs-regexp { color: #f5c2e7; }          /* pink */

    .hljs-title { color: #89b4fa; }           /* blue */

    .hljs-tag { color: #cba6f7; }             /* mauve */
    .hljs-tag .hljs-attr { color: #89dceb; }  /* sky */
    .hljs-tag .hljs-string { color: #a6e3a1; } /* green */

    .hljs-meta,
    .hljs-meta .hljs-keyword { color: #fab387; }  /* peach */

    .hljs-deletion { color: #f38ba8; }        /* red */

    .hljs-section { color: #89b4fa; font-weight: 600; }  /* blue */

    .hljs-selector-class,
    .hljs-selector-id { color: #f9e2af; }     /* yellow */

    .hljs-attribute { color: #f9e2af; }        /* yellow */

    .hljs-punctuation,
    .hljs-operator { color: #94e2d5; }         /* teal */

    .hljs-property { color: #89b4fa; }         /* blue */

    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: bold; }

    /* === Catppuccin Mocha Palette === */
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-surface: #313244;
      --bg-hover: #45475a;

      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-dim: #6c7086;

      --diff-add-bg: rgba(166, 227, 161, 0.15);
      --diff-add-text: #a6e3a1;
      --diff-add-gutter: rgba(166, 227, 161, 0.3);
      --diff-del-bg: rgba(243, 139, 168, 0.15);
      --diff-del-text: #f38ba8;
      --diff-del-gutter: rgba(243, 139, 168, 0.3);

      --accent-danger: #f38ba8;
      --accent-primary: #cba6f7;
      --accent-primary-hover: #b48ef0;

      --border: #45475a;
      --border-subtle: #313244;

      --selection-bg: rgba(137, 180, 250, 0.15);

      --font-code: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", monospace;
      --font-ui: "Inter", "SF Pro", system-ui, sans-serif;

      --font-xs: 13px;
      --font-sm: 14px;
      --font-base: 15px;
      --font-md: 18px;
      --font-lg: 22px;

      --sidebar-width: 240px;
    }

    /* === Base === */
    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--font-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* === Layout === */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-title {
      font-size: var(--font-base);
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === Sidebar === */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
      flex-shrink: 0;
      transition: margin-left 200ms ease;
    }

    .sidebar.hidden {
      margin-left: calc(-1 * var(--sidebar-width));
    }

    .sidebar-section {
      padding: 0 12px;
      margin-bottom: 16px;
    }

    .sidebar-label {
      font-size: var(--font-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .sidebar-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      font-size: var(--font-md);
    }

    /* === Commit List === */
    .commit-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: var(--font-xs);
      color: var(--text-secondary);
    }

    .commit-item:hover {
      background: var(--bg-hover);
    }

    .commit-item.active {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    .commit-radio {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--text-dim);
      flex-shrink: 0;
    }

    .commit-item.active .commit-radio {
      border-color: var(--accent-primary);
      background: var(--accent-primary);
    }

    .commit-hash {
      font-family: var(--font-code);
      font-size: var(--font-xs);
      color: var(--text-dim);
    }

    .commit-msg {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* === File List === */
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: var(--font-xs);
      font-family: var(--font-code);
      color: var(--text-secondary);
    }

    .file-item:hover {
      background: var(--bg-hover);
    }

    .file-stats {
      font-size: var(--font-xs);
      white-space: nowrap;
    }

    .file-stats-add { color: var(--diff-add-text); }
    .file-stats-del { color: var(--diff-del-text); }

    /* === Comment List (sidebar) === */
    .comment-list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: var(--font-xs);
    }

    .comment-list-item:hover {
      background: var(--bg-hover);
    }

    .comment-list-item.dimmed {
      opacity: 0.4;
    }

    .comment-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
    }

    /* === Description === */
    .description-text {
      font-size: var(--font-xs);
      color: var(--text-secondary);
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* === Summary === */
    .summary-textarea {
      width: 100%;
      min-height: 60px;
      padding: 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--font-xs);
      line-height: 1.4;
      resize: vertical;
    }

    .summary-textarea:focus {
      outline: 2px solid var(--accent-primary);
      outline-offset: -1px;
    }

    /* === Diff Area === */
    .diff-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0;
    }

    /* === File Section === */
    .file-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .file-path {
      font-family: var(--font-code);
      font-size: var(--font-sm);
      font-weight: 500;
      color: var(--text-primary);
    }

    .file-path-old {
      color: var(--text-dim);
      text-decoration: line-through;
      margin-right: 8px;
    }

    .file-rename-arrow {
      color: var(--text-dim);
      margin: 0 8px;
    }

    .file-change-stats {
      font-family: var(--font-code);
      font-size: var(--font-xs);
    }

    /* === Diff Table === */
    .diff-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-code);
      font-size: var(--font-sm);
      line-height: 1.5;
      table-layout: fixed;
    }

    .diff-table td {
      padding: 0 8px;
      vertical-align: top;
      white-space: pre;
    }

    /* Line number gutter */
    .gutter {
      width: 55px;
      min-width: 55px;
      text-align: right;
      color: var(--text-dim);
      user-select: none;
      cursor: pointer;
      padding-right: 12px !important;
      border-right: 1px solid var(--border-subtle);
    }

    .gutter:hover {
      color: var(--text-secondary);
    }

    .gutter-del {
      color: var(--text-dim);
      cursor: default;
    }

    /* Line content */
    .diff-table td.line-content {
      white-space: pre-wrap;
      word-break: break-all;
      padding-left: 12px !important;
    }

    /* Line types */
    .line-add {
      background: var(--diff-add-bg);
    }

    .line-add .gutter {
      background: var(--bg-primary);
    }

    .line-del {
      background: var(--diff-del-bg);
    }

    .line-del .gutter {
      background: var(--bg-primary);
    }

    .line-context .line-content {
      color: var(--text-secondary);
    }

    /* Selectable rows — gutter is pointer, content is text */
    .diff-table tr {
      cursor: text;
    }

    .diff-table tr .gutter {
      cursor: pointer;
    }

    .diff-table tr:hover .gutter {
      color: var(--text-secondary);
    }

    /* Floating comment button for text selection */
    .text-select-comment-btn {
      position: fixed;
      z-index: 1000;
      padding: 4px 12px;
      background: var(--accent-primary);
      color: var(--bg-primary);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      user-select: none;
    }
    .text-select-comment-btn:hover {
      filter: brightness(1.2);
    }

    /* Selected lines (finalized, comment box shown) */
    .line-selected {
      background: var(--selection-bg) !important;
    }

    .line-selected .gutter {
      background: rgba(137, 180, 250, 0.2) !important;
    }

    /* Selecting lines (during drag, no comment box yet) */
    .line-selecting {
      background: var(--selection-bg) !important;
    }

    .line-selecting .gutter {
      background: rgba(137, 180, 250, 0.2) !important;
    }

    /* === Expand Arrows === */
    .expand-row td {
      text-align: center;
      padding: 2px 0;
      color: var(--text-dim);
      cursor: pointer;
      font-size: var(--font-xs);
      user-select: none;
    }

    .expand-row:hover td {
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    .fold-row td {
      text-align: center;
      padding: 2px 0;
      color: var(--text-dim);
      cursor: pointer;
      font-size: var(--font-xs);
      user-select: none;
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
    }

    .fold-row:hover td {
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    /* === Hunk Separator === */
    .hunk-separator td {
      border-top: 1px dashed var(--border);
      padding: 0;
      height: 1px;
    }

    /* === Comment Box (inline) === */
    .comment-box-row td {
      padding: 0;
    }

    .comment-box {
      margin: 4px 16px 4px 67px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      max-width: 100%;
      transition: max-height 150ms ease;
    }

    .comment-textarea {
      width: calc(100% - 24px);
      margin: 8px 12px;
      min-height: 60px;
      padding: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--font-xs);
      line-height: 1.4;
      resize: vertical;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .comment-textarea:focus {
      outline: 2px solid var(--accent-primary);
      outline-offset: -1px;
    }

    .comment-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 4px 12px 8px;
    }

    /* === Saved Comment Banner === */
    .saved-comment {
      margin: 4px 16px 4px 67px;
      padding: 8px 12px;
      background: var(--bg-surface);
      border-radius: 4px;
      cursor: pointer;
      font-size: var(--font-xs);
      color: var(--text-secondary);
      line-height: 1.4;
      overflow-wrap: break-word;
      word-wrap: break-word;
    }

    .saved-comment:hover {
      background: var(--bg-hover);
    }

    .btn-delete-comment {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: var(--font-md);
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .btn-delete-comment:hover {
      color: var(--accent-danger);
    }

    .saved-comment-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .saved-comment-location {
      font-family: var(--font-code);
      font-size: var(--font-xs);
      color: var(--text-dim);
    }

    /* === Buttons === */
    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: var(--font-xs);
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 100ms ease;
    }

    .btn:focus {
      outline: 2px solid var(--accent-primary);
      outline-offset: 2px;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent-primary);
      color: var(--bg-primary);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-primary-hover);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: none;
      padding: 4px 8px;
    }

    .btn-ghost:hover:not(:disabled) {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .btn-danger {
      background: transparent;
      color: var(--accent-danger);
      border: none;
      padding: 4px 8px;
    }

    .btn-danger:hover:not(:disabled) {
      background: rgba(243, 139, 168, 0.12);
    }

    /* === Binary file === */
    .binary-notice {
      padding: 16px;
      text-align: center;
      color: var(--text-dim);
      font-style: italic;
    }

    /* === Truncation notice === */
    .truncated-notice {
      padding: 4px 16px;
      text-align: center;
      color: var(--text-dim);
      font-size: var(--font-xs);
      background: var(--bg-surface);
    }

    /* === Empty state === */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: var(--font-base);
    }

    /* === Loading state === */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
    }

    /* === Past Reviews === */
    .past-review-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      font-size: var(--font-xs);
      color: var(--text-secondary);
      border-radius: 4px;
    }

    .past-review-name {
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .past-review-name:hover {
      color: var(--text-primary);
    }

    .btn-delete-review {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: var(--font-base);
      padding: 0 4px;
      flex-shrink: 0;
    }

    .btn-delete-review:hover {
      color: var(--accent-red);
    }

    .past-review-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .past-review-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .past-review-rendered {
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .past-review-rendered h1 {
      font-size: var(--font-lg);
      color: var(--text-primary);
      margin: 0 0 12px;
    }

    .past-review-rendered h2 {
      font-size: var(--font-md);
      color: var(--text-primary);
      margin: 20px 0 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }

    .past-review-rendered h3 {
      font-size: var(--font-base);
      color: var(--text-primary);
      margin: 16px 0 4px;
    }

    .past-review-rendered p {
      margin: 4px 0;
    }

    .past-review-rendered strong {
      color: var(--text-primary);
    }

    .past-review-rendered code {
      font-family: var(--font-mono);
      font-size: var(--font-xs);
      background: var(--bg-surface);
      padding: 1px 4px;
      border-radius: 3px;
    }

    .past-review-rendered pre {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
    }

    .past-review-rendered pre code {
      background: none;
      padding: 0;
      font-size: var(--font-sm);
      line-height: 1.5;
    }

    .past-review-rendered ul {
      margin: 4px 0;
      padding-left: 20px;
    }

    .past-review-rendered li {
      margin: 2px 0;
    }

    .past-review-raw {
      font-family: var(--font-mono);
      font-size: var(--font-sm);
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* === Scrollbar === */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-hover);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-dim);
    }

    /* === Section collapse === */
    .section-collapsible {
      overflow: hidden;
      transition: max-height 200ms ease;
    }

    /* === Highlight animation for scroll-to-file === */
    @keyframes highlight-fade {
      0% { background-color: rgba(249, 226, 175, 0.2); }
      100% { background-color: transparent; }
    }

    .file-header.highlighted {
      animation: highlight-fade 1s ease-out;
    }

    /* === Responsive === */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.4);
      }

      .sidebar.hidden {
        margin-left: 0;
        transform: translateX(-100%);
        transition: transform 200ms ease;
      }

      .sidebar:not(.hidden) {
        transform: translateX(0);
        transition: transform 200ms ease;
      }

      .sidebar-toggle {
        display: block;
      }

      .sidebar-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 49;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <!-- BUNDLE -->
</body>
</html>
