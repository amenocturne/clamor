description: Minimal Pi agent for quick questions
runtime: pi
target: .pi-quick

prompt: prompt.md

common:
  - communication-style
  - commands

skills:
  - pinchtab

extensions:
  - permission-gate
  - background-tasks

settings:
  defaultProvider: nestor
  defaultModel: tgpt/qwen3-next-80b-a3b-instruct
  allowedProviders:
    - nestor
  defaultThinkingLevel: medium
