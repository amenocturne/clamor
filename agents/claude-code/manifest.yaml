description: Claude Code with full dev workflow
runtime: claude-code
target: .claude

prompt: prompt.md

common:
  - dev-workflow
  - code-conventions
  - communication-style
  - commands
  - agentic-kit

skills:
  - dev-philosophy
  - spec
  - workspace
  - documentation
  - orchestrator
  - dev-cycle
  - worktree
  - brainstorm
  - idea-roaster
  - creative-freedom
  - frontend
  - playwright
  - review
  - checkpoint
  - pinchtab
  - context7
  - spectrogram
  - config
  - project-setup
  - todo
  - talk
  - shh
  - clamor

hooks:
  - notification
  - workflow-check
  - clamor
  - deny-read
  - smart-approve
  - tts

settings:
  permissions:
    allow:
      - "Read(.claude/skills/**/*)"
      - "Read(.claude/instructions/**/*)"
      - "Read(.claude/templates/**/*)"
      - "Read(.claude/tasks/**/*)"
      - "Read(WORKSPACE.yaml)"
      - "Bash(uv run .claude/skills/**/scripts/*.py *)"
      - "Bash(just -f .claude/skills/*/justfile *)"

external:
  - github.com/anthropics/skills/skill-creator
