# Disguise Configuration
#
# Define named agent configurations (disguises). The first entry is the default.
# Switch with /disguise during a session.
#
# Each disguise is a DisguiseNode — same schema recursively for subagents:
#   model:         (optional) provider/model-id. Falls back to settings default.
#   tools:         (optional) tool restrictions.
#     deny:        list of tools to block
#     allow:       list of tools to allow
#   context_rules: (optional) injection rules scoped to this agent.
#     - on:        event type — session_start, tool_call, agent_end, context_compact
#       tool:      (optional) tool name filter for tool_call events
#       match:     (optional) glob pattern against tool arguments
#       inject:    file path(s) relative to .pi/. Injected at most once per session.
#   subagents:     (optional) nested agents, same schema.

disguises:
  # Solo — just you and the model
  solo:
    context_rules:
      - on: session_start
        inject: prompts/project-overview.md

  # Team — orchestrator with subagents
  team:
    context_rules:
      - on: session_start
        inject: prompts/project-overview.md
    subagents:
      builder:
        context_rules:
          - on: session_start
            inject: prompts/builder.md
      reviewer:
        tools:
          deny: [write, edit]
        context_rules:
          - on: session_start
            inject: prompts/review-checklist.md
