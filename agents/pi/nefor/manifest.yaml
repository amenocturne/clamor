description: Nefor — bleeding-edge Pi agent harness
runtime: pi
target: .pi

system_prompt:
  common:
    - dev-workflow
    - code-conventions
    - communication-style
    - commands
  local:
    - prompt.md
    - instructions/tool-usage.md

skills:
  - spec
  - workspace
  - brainstorm
  - todo
  - pinchtab
  - context7
  - review
  - checkpoint

extensions:
  - disguise
  - permission-gate
  - background-tasks
  - behavioral-reminders
  - nestor-provider
  - provider-filter

hooks:
  - deny-read
  - smart-approve
  - notification

settings:
  defaultProvider: nestor
  defaultModel: tgpt/qwen3-next-80b-a3b-instruct
  allowedProviders:
    - nestor
  defaultThinkingLevel: medium
