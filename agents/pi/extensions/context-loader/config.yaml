# Context Loader Configuration
#
# Defines how to detect work context from tool calls and which
# instruction files to inject for each context.

# General instructions (always injected at session start via appendSystemPrompt)
general: []
  # - path: instructions/base.md
  # - path: instructions/coding-style.md

# Context-specific instructions (injected via sendMessage on context switch)
contexts:
  docs:
    detect:
      file_extensions: [".md", ".mdx", ".rst", ".adoc", ".txt"]
      directories: ["docs/", "documentation/", "wiki/"]
    instructions: []
      # - path: instructions/docs.md

  testing:
    detect:
      file_extensions: [".test.ts", ".spec.ts", "_test.go", "test_*.py", ".test.js", ".spec.js"]
      commands: ["pytest", "jest", "vitest", "cargo test", "go test", "bun test"]
    instructions: []
      # - path: instructions/testing.md

  planning:
    detect:
      keywords: ["just plan", "plan only", "don't implement"]
    instructions: []
      # - path: instructions/planning.md

  reviewing:
    detect:
      commands: ["git diff", "git log", "git show"]
      file_extensions: [".patch", ".diff"]
    instructions: []
      # - path: instructions/reviewing.md

  config:
    detect:
      file_extensions: [".yaml", ".yml", ".toml", ".ini", ".json", ".env"]
      directories: [".github/", ".ci/", "ansible/", "terraform/"]
    instructions: []
      # - path: instructions/config.md

